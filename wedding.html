<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Свадьба Максима и Евгении</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Добавляем фоновое изображение */
            background-image: url('https://example.com/path/to/swans.jpg'); /* Замените на путь к вашему изображению */
            background-position: center; /* Центрируем изображение */
            background-repeat: no-repeat; /* Запрещаем повторение изображения */
            background-size: cover; /* Масштабируем изображение, чтобы оно покрывало весь фон */
            background-attachment: fixed; /* Фиксируем фон при прокрутке */
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.7); /* Полупрозрачный белый фон для контейнера */
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d46a7e;
            font-size: 2.5em;
        }
        .couple-names {
            font-size: 3em;
            margin: 20px 0;
            color: #8b4513;
        }
        .details {
            margin: 30px 0;
            line-height: 1.6;
        }
        .rsvp-button {
            background-color: #d46a7e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Приглашаем на нашу свадьбу!</h1>
        <div class="couple-names">Максим & Евгения</div>

        <div class="details">
            <p><strong>Дата:</strong> 6 июня 2026 года</p>
            <p><strong>Время и место №1:</strong> 15:00 — ЗАГС, г. Березино, ул. Комсомольская, д. 27</p>
            <p><strong>Время и место №2:</strong> 18:00 — Кафе «Старый берег», г. Березино, ул. Ульянова, д. 3</p>
            <p>Будем рады разделить с вами этот особенный день!</p>
        </div>

        <button class="rsvp-button" onclick="alert('Спасибо! Ваше подтверждение получено.')">Подтвердить участие</button>
    </div>
</body>
</html>
